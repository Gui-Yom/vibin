[package]
name = "vibin"
version = "0.1.0"
authors = ["Guillaume Anthouard <guillaume.anthouard@hotmail.fr>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[profile.release]
lto = "fat"
codegen-units = 1

[dependencies]
# the configuration file format
ron = "0.6"
# The window
winit = "0.24"
raw-window-handle = "0.3"
# The video decoder
libmpv = { version = "2.0", features = ["build_libmpv"] }
libmpv-sys = "3.1"
crossbeam-utils = "0.8"
