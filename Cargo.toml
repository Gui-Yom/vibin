[package]
name = "vibin"
version = "0.1.0"
authors = ["Guillaume Anthouard <guillaume.anthouard@hotmail.fr>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[profile.release]
lto = "fat"
codegen-units = 1

[dependencies]
matroska = { git = "https://github.com/rust-av/matroska" }
av-data = "~0.2.2"
av-format = "~0.2.1"
audiopus = "~0.2.0"
rodio = "~0.13.0"
image = "~0.23.12"
