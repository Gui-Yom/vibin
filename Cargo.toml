[package]
name = "vibin"
version = "0.1.0"
authors = ["Guillaume Anthouard <guillaume.anthouard@hotmail.fr>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[profile.release]
lto = "fat"
codegen-units = 1

[dependencies]
rodio = { version = "~0.13", features = ["vorbis"] }
image = { version = "~0.23", features = ["png", "gif"] }
ron = "~0.6"
#winit = "~0.23"
conrod_core = "~0.71"
#conrod_winit = "~0.71"
conrod_piston = "~0.71"
piston_window = { version = "~0.116" }
#pistoncore-winit_window = "~0.12"
